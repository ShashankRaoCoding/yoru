name: Go Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v -o yoru

      - name: Test
        run: go test -v ./...

      - name: Upload artifact (main branch only)
        if: github.ref == 'refs/heads/main' && matrix.go-version == '1.22'
        uses: actions/upload-artifact@v4
        with:
          name: yoru-binary
          path: yoru
          retention-days: 7
